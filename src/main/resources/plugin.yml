name: SkyRelics
version: 1.0
main: me.jolikki.skyrelics.SkyRelics
api-version: 1.16
author: jolikki
softdepend:
  - LuckPerms

commands:
  skyrelics:
    description: Управление предметами SkyRelics и силами реликвий
    usage: /skyrelics <help|list|give|giveall|info|inspect|validate|abilities|cooldown|reload>
    aliases:
      - sr
    permission: skyrelics.command

permissions:
  skyrelics.command:
    description: Разрешает использовать команду /skyrelics
    default: op
  skyrelics.command.give:
    description: Разрешает выдавать предметы SkyRelics
    default: op
  skyrelics.command.giveall:
    description: Разрешает выдавать предметы SkyRelics всем игрокам онлайн
    default: op
  skyrelics.command.list:
    description: Разрешает просматривать список настроенных предметов SkyRelics
    default: op
  skyrelics.command.info:
    description: Разрешает просматривать подробную информацию о предметах SkyRelics
    default: op
  skyrelics.command.inspect:
    description: Разрешает проверять предмет SkyRelics в руке
    default: op
  skyrelics.command.validate:
    description: Разрешает проверять конфигурацию SkyRelics
    default: op
  skyrelics.command.abilities:
    description: Разрешает просматривать доступные типы способностей SkyRelics
    default: op
  skyrelics.command.cooldown:
    description: Разрешает сбрасывать перезарядки SkyRelics
    default: op
  skyrelics.command.reload:
    description: Разрешает перезагружать конфигурацию SkyRelics
    default: op
  skyrelics.herobrine.summoner:
    description: Отмечает игрока, который уже призывал Херобрина
    default: false
